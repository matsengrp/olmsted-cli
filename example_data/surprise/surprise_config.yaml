# =============================================================================
# Olmsted CLI — Surprise Analysis Configuration
# =============================================================================
#
# This config is designed for DASM2 surprise analysis data that has been
# pre-built into Olmsted JSON format. Use with the `enrich` command to add
# field_metadata describing the surprise-specific fields.
#
# Usage:
#   olmsted enrich -i top20_by_count_olmsted.json -o enriched.json -c surprise.yaml
#   olmsted enrich -i top20_by_count_olmsted.json --in-place -c surprise.yaml
#
# =============================================================================


# --- Custom Fields for Surprise Analysis Data ---------------------------------
#
# Surprise analysis data typically has:
#   - Clone-level: mean_surprise_mutsel, num_mutations
#   - Mutation-level: surprise_mutsel, surprise_neutral, selection_contribution, region
#
# The mutation-level fields are auto-detected from mutations arrays
# on tree nodes. The clone-level fields below ensure correct type and label
# classification for fields that auto-detection would also find, but with
# more descriptive labels.

custom_fields:
  # Clone-level surprise metrics
  - name: mean_surprise_mutsel
    level: clone
    type: continuous
    label: "Mean Surprise (MutSel)"

  - name: num_mutations
    level: clone
    type: continuous
    label: "Number of Mutations"

  # Mutation-level fields (also auto-detected, but explicit labels here)
  - name: surprise_mutsel
    level: mutation
    type: continuous
    label: "Surprise Score (MutSel)"

  - name: surprise_neutral
    level: mutation
    type: continuous
    label: "Surprise Score (Neutral)"

  - name: selection_contribution
    level: mutation
    type: continuous
    label: "Selection Contribution"

  - name: region
    level: mutation
    type: categorical
    label: "Gene Region"
