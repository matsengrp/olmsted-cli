[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --capture=no --log-cli-format="%(asctime)s [%(levelname)8s] [%(name)s] %(message)s"
norecursedirs = airr-standards .git .venv venv _test_output
markers =
    airr: marks tests for AIRR data processing
    pcp: marks tests for PCP data processing
    paired: marks tests for paired chain data processing
    slow: marks tests as slow

# Output settings
cache_dir = _test_output/.pytest_cache

# Logging configuration
log_cli = true
log_cli_level = INFO
log_file = _test_output/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] [%(name)s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S