[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    airr: marks tests for AIRR data processing
    pcp: marks tests for PCP data processing
    slow: marks tests as slow

# Output settings
cache_dir = _test_output/.pytest_cache

# Optional: capture output to files
# log_cli = true
# log_cli_level = INFO
# log_file = _test_output/pytest.log