# =============================================================================
# Field configuration generated from: input-pcp.csv
# Detected format: pcp
# =============================================================================
#
# This file lists all fields discovered in your data. Edit it to:
#   - Remove fields you don't want in the web app dropdowns
#   - Change type (continuous, categorical, aa, dna, list, json)
#   - Change display mode (dropdown, tooltip, skip)
#   - Customize display labels
#   - Uncomment processing options below as needed
#
# Then use with:  olmsted process -c this_file.yaml

# =============================================================================
# Processing Options (uncomment and edit as needed)
# =============================================================================

inputs: [example-data/pcp/input-pcp.csv]
tree: example-data/pcp/input-trees.csv
output: output.json
format: pcp

# name: "My Dataset"
# description: ""
# seed: 42             # for reproducible UUIDs

# --- Metric Computation ---
# Computes LBI, LBR, affinity, and scaled_affinity for all tree nodes.
# Requires tree branch lengths (works with any format that has them).
# compute_metrics: true
# lbi_tau: 0.0125      # time scale parameter for LBI

# standardize_names: false  # rename nodes to naive, Node1, Leaf1, ...
# validate: false
# verbose: 1


# =============================================================================
# Field Declarations
# =============================================================================
#
# Each field entry supports:
#   name:        Field name in the input data (required)
#   output_name: Renamed field in output (optional)
#   level:       family, node, branch, or mutation (required)
#   type:        continuous, categorical, aa, dna, list, or json (required)
#   display:     dropdown (default), tooltip, or skip (optional)
#   label:       Display label in web app (required)
#   skip:        true to exclude from metadata (shorthand for display: skip)
#   range:       [min, max] for continuous fields (optional)
#   encoding:    list, json, or records (mutation-level only, optional)
#   source:      node field containing the data (required for encoding: records)
#
# Types (what the data IS):
#   continuous  — numeric (axes, size, color scales)
#   categorical — string/enum (color, shape, facet)
#   aa          — amino acid identity (full genetic alphabet)
#   dna         — nucleotide identity (full genetic alphabet)
#   list        — ordered sequence of values (e.g. per-position data)
#   json        — structured key-value data (pretty-printed in tooltips)
#
# Display modes (how to show it):
#   dropdown    — in visualization controls (default, omit if not needed)
#   tooltip     — shown on hover only, not in controls
#   skip        — excluded from output metadata entirely
#
# Cross-format aliases (suggested output_name, remove if not needed):
#   v_gene, v_gene_heavy  ->  v_call
#   d_gene, d_gene_heavy  ->  d_call
#   j_gene, j_gene_heavy  ->  j_call
#   rearrangement_count   ->  unique_seqs_count
#   size                  ->  total_read_count

custom_fields:

  # --- Family level (clonal family — scatterplot axes, color, facet) ---
  - name: d_call
    level: family
    type: categorical
    label: "D Gene"
    # sample values: , , , , , ...
  - name: has_seed
    level: family
    type: categorical
    label: "Has Seed"
    # sample values: False, False, False, False, False, ...
  - name: j_call
    level: family
    type: categorical
    label: "J Gene"
    # sample values: IGHJ4*02, IGHJ6*02, IGHJ3*01, IGHJ4*02, IGHJ4*02, ...
  - name: junction_length
    level: family
    type: continuous
    label: "Junction Length"
    # sample values: 60, 69, 54, 36, 27, ...
  - name: locus
    level: family
    type: categorical
    label: "Locus"
    # sample values: igh, igh, igh, igh, igh, ...
  - name: mean_mut_freq
    level: family
    type: continuous
    label: "Mean Mutation Frequency"
    # sample values: 0.0, 0.3258539273707159, 0.34998525966267896, 0.2677102785558668, 0.34410919540229884, ...
  - name: sample_id
    level: family
    type: categorical
    label: "Sample"
    # sample values: sample-igg-1008, sample-igg-0007, sample-igg-705c, sample-igg-4002, sample-igg-5001, ...
  - name: total_read_count
    level: family
    type: continuous
    label: "Total Read Count"
    # sample values: 13, 63, 58, 44, 29, ...
  - name: unique_seqs_count
    level: family
    type: continuous
    label: "Unique Sequences Count"
    # sample values: 14, 47, 46, 34, 23, ...
  - name: v_call
    level: family
    type: categorical
    label: "V Gene"
    # sample values: IGHV3-48*01, IGHV3-73*01, IGHV3-9*01, IGHV3-30*02, IGHV3-53*01, ...

  # --- Node level (tree node properties, tooltips) ---
  - name: cluster_multiplicity
    level: node
    type: continuous
    label: "Cluster Multiplicity"
    # sample values: 7, 7, 6, 5, 1, ...
  - name: distance
    level: node
    type: continuous
    label: "Distance from Root"
    # sample values: 0.0, 7.78e-08, 1.5549999999999998e-07, 2.332e-07, 3.1099999999999997e-07, ...
  - name: multiplicity
    level: node
    type: continuous
    label: "Multiplicity"
    # sample values: 0, 1, 1, 1, 1, ...
  - name: pcp_index
    level: node
    type: continuous
    label: "Pcp Index"
    # sample values: 0, 1, 2, 3, 4, ...

  # --- Branch level (tree branch coloring, width) ---
  - name: length
    level: branch
    type: continuous
    label: "Branch Length"
    # sample values: 0.0, 7.78e-08, 7.77e-08, 7.77e-08, 7.78e-08, ...

  # --- Mutation level (alignment coloring) ---
  # The following fields are derived by the web app from
  # parent/child sequence alignments during rendering:
  - name: child_aa
    level: mutation
    type: aa
    label: "Child Amino Acid"
  - name: parent_aa
    level: mutation
    type: aa
    display: tooltip
    label: "Parent Amino Acid"

  # =================================================================
  # Skipped fields (not included in output metadata)
  # Remove 'skip: true' to include a field, or delete the entry
  # =================================================================
  - name: cdr1_alignment_end
    level: family
    skip: true
    type: continuous
    label: "CDR1 Alignment End"
    # sample values: 96, 96, 96, 96, 96, ...
  - name: cdr1_alignment_start
    level: family
    skip: true
    type: continuous
    label: "CDR1 Alignment Start"
    # sample values: 75, 75, 75, 75, 75, ...
  - name: cdr2_alignment_end
    level: family
    skip: true
    type: continuous
    label: "CDR2 Alignment End"
    # sample values: 171, 177, 171, 171, 168, ...
  - name: cdr2_alignment_start
    level: family
    skip: true
    type: continuous
    label: "CDR2 Alignment Start"
    # sample values: 150, 150, 150, 150, 150, ...
  - name: clone_id
    level: family
    skip: true
    type: categorical
    label: "Clone ID"
    # sample values: 3249, 1297, 741, 470, 160, ...
  - name: d_alignment_end
    level: family
    skip: true
    type: continuous
    label: "D Alignment End"
    # sample values: 0, 0, 0, 0, 0, ...
  - name: d_alignment_start
    level: family
    skip: true
    type: continuous
    label: "D Alignment Start"
    # sample values: 0, 0, 0, 0, 0, ...
  - name: dataset_id
    level: family
    skip: true
    type: categorical
    label: "Dataset ID"
    # sample values: dataset-14b429db-6afa-5d76-5c16-dd7dab2897af, dataset-14b429db-6afa-5d76-5c16-dd7dab2897af, dataset-14b429db-6afa-5d76-5c16-dd7dab2897af, dataset-14b429db-6afa-5d76-5c16-dd7dab2897af, dataset-14b429db-6afa-5d76-5c16-dd7dab2897af, ...
  - name: ident
    level: family
    skip: true
    type: categorical
    label: "Ident"
    # sample values: clone-6a5eb4e0-90d9-e591-ee20-6debc0f4b040, clone-6fad0c6f-ef46-f158-7391-728cb379fcec, clone-bfdd83da-8e95-1048-1ec0-fc750e65bc19, clone-8ad370da-caa2-665c-2cdc-b78f8886901f, clone-d20f0d49-77e8-15c5-ebe4-2927bc6aeb1f, ...
  - name: j_alignment_end
    level: family
    skip: true
    type: continuous
    label: "J Alignment End"
    # sample values: 0, 0, 0, 0, 0, ...
  - name: j_alignment_start
    level: family
    skip: true
    type: continuous
    label: "J Alignment Start"
    # sample values: 0, 0, 0, 0, 0, ...
  - name: junction_start
    level: family
    skip: true
    type: continuous
    label: "Junction Start"
    # sample values: 288, 294, 288, 288, 285, ...
  - name: v_alignment_end
    level: family
    skip: true
    type: continuous
    label: "V Alignment End"
    # sample values: 0, 0, 0, 0, 0, ...
  - name: v_alignment_start
    level: family
    skip: true
    type: continuous
    label: "V Alignment Start"
    # sample values: 0, 0, 0, 0, 0, ...
  - name: type
    level: node
    skip: true
    type: categorical
    label: "Type"
    # sample values: root, internal, internal, internal, leaf, ...

