# =============================================================================
# Olmsted CLI — Mutations Example Configuration
# =============================================================================
#
# Example field-metadata configuration for mutation-level annotation data.
# The fields described here (surprise_mutsel, surprise_neutral, ...) come
# from DASM2 surprise analysis output, but the same pattern applies to any
# mutation-level annotations: declare each field's level, type, and label
# and use the `enrich` command to attach `field_metadata` to the JSON.
#
# Usage:
#   olmsted enrich -i mutations-olmsted.json -o enriched.json -c mutations-config.yaml
#   olmsted enrich -i mutations-olmsted.json --in-place -c mutations-config.yaml
#
# =============================================================================


# --- Custom Fields for Surprise Analysis Data ---------------------------------
#
# Surprise analysis data typically has:
#   - Clone-level: mean_surprise_mutsel, num_mutations
#   - Mutation-level: surprise_mutsel, surprise_neutral, selection_contribution, region
#
# The mutation-level fields are auto-detected from mutations arrays
# on tree nodes. The clone-level fields below ensure correct type and label
# classification for fields that auto-detection would also find, but with
# more descriptive labels.

custom_fields:
  # Clone-level surprise metrics
  - name: mean_surprise_mutsel
    level: clone
    type: continuous
    label: "Mean Surprise (MutSel)"

  - name: num_mutations
    level: clone
    type: continuous
    label: "Number of Mutations"

  # Mutation-level fields (also auto-detected, but explicit labels here)
  - name: surprise_mutsel
    level: mutation
    type: continuous
    label: "Surprise Score (MutSel)"

  - name: surprise_neutral
    level: mutation
    type: continuous
    label: "Surprise Score (Neutral)"

  - name: selection_contribution
    level: mutation
    type: continuous
    label: "Selection Contribution"

  - name: region
    level: mutation
    type: categorical
    label: "Gene Region"
