# Olmsted Dataset Schema
# JSON Schema (draft-07) for a complete Olmsted dataset file.
#
# URL strategy: individual schemas are published at
#   https://olmstedviz.org/schemas/v1/{node,tree,clone,dataset}.schema.json
# This file (dataset.schema.json) is the primary entry point; it embeds
# clone, tree, and node definitions inline (via $defs) rather than using
# $ref to external URLs. This keeps each file self-contained and allows
# Python's jsonschema library to validate without a network-capable resolver.
# The published JSON artifacts are generated from these YAML source files.
#
# AIRR extensions: see node.schema.yaml for per-field annotations.
#
# NOTE: field_metadata.properties is populated dynamically at import time
# from FIELD_LEVELS in constants.py. The stub below is replaced by Python.
#
# URL: https://olmstedviz.org/schemas/v1/dataset.schema.json

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://olmstedviz.org/schemas/v1/dataset.schema.json"
title: Olmsted Dataset
description: >
  Olmsted dataset input file. Contains one or more clonal families (clones),
  each optionally containing one or more phylogenetic trees with per-node data.
  The field_metadata property drives the Olmsted web application's dynamic
  dropdown controls for scatterplot axes, color, and faceting.

type: object
required:
  - dataset_id
additionalProperties: true

definitions:
  timepoint_multiplicity:
    title: Timepoint multiplicity
    description: Multiplicity at a specific time
    type: object
    required:
      - multiplicity
      - timepoint_id
    properties:
      multiplicity:
        description: Number of times sequence was observed at the given timepoint
        type: integer
        minimum: 0
      timepoint_id:
        description: Id associated with the timepoint in question
        type: ["string", "null"]
    additionalProperties: false

  node:
    title: Node
    description: Node in a phylogenetic tree
    type: object
    required:
      - sequence_id
      - sequence_alignment
      - sequence_alignment_aa
    additionalProperties: true
    properties:
      sequence_id:
        description: Identifier for this node that matches the id in the newick string
        type: string
      node_id:
        description: Alternative identifier for this node
        type: string
      parent:
        description: Parent node ID
        type: ["string", "null"]
      branch_length:
        description: Branch length to parent
        type: ["number", "null"]
      length:
        description: Branch length (alias for branch_length)
        type: ["number", "null"]
      distance:
        description: Distance from root
        type: ["number", "null"]
      sequence_alignment:
        description: Nucleotide sequence alignment, including any indel corrections or spacers
        type: string
      sequence_alignment_aa:
        description: Amino acid sequence alignment, including any indel corrections or spacers
        type: ["string", "null"]
      sample_id:
        description: Sample identifier
        type: ["string", "null"]
      type:
        description: Type of node (leaf, internal, node, or root)
        type: ["string", "null"]
        enum: [leaf, node, internal, root, null]
      is_root:
        description: Whether this node is the root
        type: ["boolean", "null"]
      subtree_size:
        description: Number of descendants
        type: ["integer", "null"]
      timepoint:
        description: Timepoint identifier
        type: ["string", "null"]
      timepoint_id:
        description: Timepoint identifier (alternative field name)
        type: ["string", "null"]
      lbi:
        description: Local branching index
        type: ["number", "null"]
      lbr:
        description: Local branching ratio
        type: ["number", "null"]
      affinity:
        description: Binding affinity
        type: ["number", "null"]
      relative_affinity:
        description: Relative binding affinity
        type: ["number", "null"]
      affinity_class:
        description: Affinity classification
        type: ["string", "null"]
      aa_sequence:
        description: Full amino acid sequence
        type: ["string", "null"]
      junction:
        description: CDR3 junction nucleotide sequence
        type: ["string", "null"]
      junction_aa:
        description: CDR3 junction amino acid sequence
        type: ["string", "null"]
      v_call:
        description: V gene assignment
        type: ["string", "null"]
      d_call:
        description: D gene assignment
        type: ["string", "null"]
      j_call:
        description: J gene assignment
        type: ["string", "null"]
      count:
        description: Sequence count
        type: ["integer", "null"]
      confidence:
        description: Confidence score or bootstrap value
        type: ["number", "null"]
      multiplicity:
        description: Number of times sequence was observed
        type: ["integer", "null"]
      cluster_multiplicity:
        description: Cumulative count if sequences were clustered
        type: ["integer", "null"]
      timepoint_multiplicities:
        description: Multiplicities per timepoint
        type: ["array", "null"]
        items:
          $ref: "#/definitions/timepoint_multiplicity"
      cluster_timepoint_multiplicities:
        description: Cluster multiplicities per timepoint
        type: ["array", "null"]
        items:
          $ref: "#/definitions/timepoint_multiplicity"
      scaled_affinity:
        description: Scaled binding affinity (min-max normalized)
        type: ["number", "null"]

  tree:
    title: Tree
    description: Phylogenetic tree and possibly ancestral state reconstruction
    type: object
    required:
      - newick
    additionalProperties: true
    properties:
      ident:
        description: Tree identifier
        type: ["string", "null"]
      tree_id:
        description: Unique identifier for the tree
        type: ["string", "null"]
      clone_id:
        description: Identifier for the associated clone
        type: ["string", "null"]
      timepoint_ids:
        description: Time points included in this tree
        type: ["array", "null"]
        items:
          type: string
      downsampling_strategy:
        description: Method used to downsample sequences before tree inference
        type: ["string", "null"]
      diversity:
        description: Mean distance from all tree nodes to their most recent common ancestor
        type: ["number", "null"]
      min_junction_length:
        description: Minimum CDR3 junction nucleotide length
        type: ["number", "null"]
      max_junction_length:
        description: Maximum CDR3 junction nucleotide length
        type: ["number", "null"]
      sample_id:
        description: Sample identifier for associated sequences
        type: ["string", "null"]
      newick:
        description: Tree in Newick format
        type: string
      nodes:
        description: Tree nodes as array of node objects or dict keyed by node ID
        oneOf:
          - type: array
            items:
              $ref: "#/definitions/node"
          - type: object
            additionalProperties:
              $ref: "#/definitions/node"

  per_gene_support_item:
    type: object
    properties:
      gene:
        type: string
      ident:
        type: string
      prob:
        type: number
    required: [gene, ident, prob]
    additionalProperties: false

  clone:
    title: Clone
    description: Clonal family of sequences deriving from a particular rearrangement event
    type: object
    required:
      - unique_seqs_count
      - mean_mut_freq
    additionalProperties: true
    properties:
      ident:
        description: Clone identifier
        type: ["string", "null"]
      clone_id:
        description: Unique identifier of the clone
        type: ["string", "null"]
      dataset_id:
        description: Dataset identifier
        type: ["string", "null"]
      sample_id:
        description: Sample identifier
        type: ["string", "null"]
      subject_id:
        description: Subject/participant identifier
        type: ["string", "null"]
      unique_seqs_count:
        description: Number of unique sequences in the clone
        type: integer
      total_read_count:
        description: Total number of reads in the clone
        type: ["integer", "null"]
      clone_count:
        description: Total number of sequences within the clone
        type: ["integer", "null"]
      mean_mut_freq:
        description: Mean mutation frequency
        type: number
      naive_sequence:
        description: Unmutated common ancestor sequence
        type: ["string", "null"]
      cdr3_sequence:
        description: CDR3 nucleotide sequence
        type: ["string", "null"]
      v_call:
        description: V gene assignment with allele
        type: ["string", "null"]
      d_call:
        description: D gene assignment with allele
        type: ["string", "null"]
      j_call:
        description: J gene assignment with allele
        type: ["string", "null"]
      v_sequence_start:
        description: Start position of V gene alignment in query sequence
        type: ["integer", "null"]
      v_sequence_end:
        description: End position of V gene alignment in query sequence
        type: ["integer", "null"]
      v_germline_start:
        description: Start position of V gene alignment in germline sequence
        type: ["integer", "null"]
      v_germline_end:
        description: End position of V gene alignment in germline sequence
        type: ["integer", "null"]
      v_alignment_start:
        description: Start position in the V gene alignment
        type: integer
      v_alignment_end:
        description: End position in the V gene alignment
        type: integer
      d_sequence_start:
        description: Start position of D gene alignment in query sequence
        type: ["integer", "null"]
      d_sequence_end:
        description: End position of D gene alignment in query sequence
        type: ["integer", "null"]
      d_germline_start:
        description: Start position of D gene alignment in germline sequence
        type: ["integer", "null"]
      d_germline_end:
        description: End position of D gene alignment in germline sequence
        type: ["integer", "null"]
      d_alignment_start:
        description: Start position in the D gene alignment
        type: ["integer", "null"]
      d_alignment_end:
        description: End position in the D gene alignment
        type: ["integer", "null"]
      j_sequence_start:
        description: Start position of J gene alignment in query sequence
        type: ["integer", "null"]
      j_sequence_end:
        description: End position of J gene alignment in query sequence
        type: ["integer", "null"]
      j_germline_start:
        description: Start position of J gene alignment in germline sequence
        type: ["integer", "null"]
      j_germline_end:
        description: End position of J gene alignment in germline sequence
        type: ["integer", "null"]
      j_alignment_start:
        description: Start position in the J gene alignment
        type: integer
      j_alignment_end:
        description: End position in the J gene alignment
        type: integer
      junction_start:
        description: Start position of CDR3 junction
        type: ["integer", "null"]
      junction_end:
        description: End position of CDR3 junction
        type: ["integer", "null"]
      junction_length:
        description: Length of CDR3 junction
        type: ["integer", "null"]
      germline_alignment:
        description: Assembled germline sequence aligned to query
        type: ["string", "null"]
      germline_sequence:
        description: Full germline sequence
        type: ["string", "null"]
      has_seed:
        description: Whether clone has seed sequence
        type: ["boolean", "null"]
      seed_id:
        description: Seed sequence identifier
        type: ["string", "null"]
      trees:
        description: Associated phylogenetic trees
        type: ["array", "null"]
        items:
          $ref: "#/definitions/tree"
      unique_ids:
        description: List of unique sequence identifiers
        type: ["array", "null"]
        items:
          type: string
      timepoint_ids:
        description: Time points included
        type: ["array", "null"]
        items:
          type: string
      v_per_gene_support:
        description: V gene assignment probabilities
        type: ["array", "null"]
        items:
          $ref: "#/definitions/per_gene_support_item"
      j_per_gene_support:
        description: J gene assignment probabilities
        type: ["array", "null"]
        items:
          $ref: "#/definitions/per_gene_support_item"
      d_per_gene_support:
        description: D gene assignment probabilities
        type: ["array", "null"]
        items:
          $ref: "#/definitions/per_gene_support_item"
      is_paired:
        description: Whether this clone is part of a paired heavy/light chain dataset
        type: ["boolean", "null"]
      pair_id:
        description: Identifier linking paired heavy and light chain clones
        type: ["string", "null"]

properties:
  schema_version:
    description: Schema version
    type: ["string", "null"]

  ident:
    description: Dataset identifier
    type: ["string", "null"]

  dataset_id:
    description: Unique identifier for the dataset
    type: string

  type:
    description: Dataset type
    type: ["string", "null"]

  build:
    description: Build information
    type: ["object", "null"]
    properties:
      commit:
        type: string
      time:
        type: string

  study_id:
    description: Study identifier
    type: ["string", "null"]

  study_title:
    description: Study title
    type: ["string", "null"]

  study_description:
    description: Study description
    type: ["string", "null"]

  study_contact:
    description: Study contact information
    type: ["string", "null"]

  inclusion_exclusion_criteria:
    description: Inclusion/exclusion criteria
    type: ["string", "null"]

  contributors:
    description: List of contributors
    type: ["array", "null"]
    items:
      type: object
      properties:
        contributor_id:
          type: string
        name:
          type: string
        orcid_id:
          type: string
        affiliation:
          type: string
        affiliation_ror_id:
          type: string

  pub_ids:
    description: Publication identifiers
    type: ["array", "null"]
    items:
      type: string

  grants:
    description: Grant information
    type: ["array", "null"]
    items:
      type: string

  keywords_study:
    description: Study keywords
    type: ["array", "null"]
    items:
      type: string

  subjects:
    description: Subject information
    type: ["array", "null"]
    items:
      type: object
      properties:
        ident:
          type: string
        subject_id:
          type: string
        subject_species:
          type: string
        sex:
          type: string
        age_min:
          type: number
        age_max:
          type: number
        age_unit:
          type: string
        age_event:
          type: string
        ancestry_population:
          type: string
        ethnicity:
          type: string
        race:
          type: string
        strain_name:
          type: string

  subject_id:
    description: Subject/participant identifier (single subject datasets)
    type: ["string", "null"]

  subject_species:
    description: Subject species
    type: ["string", "null"]

  sex:
    description: Subject sex
    type: ["string", "null"]

  age_min:
    description: Minimum age
    type: ["number", "null"]

  age_max:
    description: Maximum age
    type: ["number", "null"]

  age_unit:
    description: Age unit
    type: ["string", "null"]

  age_event:
    description: Age event
    type: ["string", "null"]

  ancestry_population:
    description: Ancestry population
    type: ["string", "null"]

  ethnicity:
    description: Ethnicity
    type: ["string", "null"]

  race:
    description: Race
    type: ["string", "null"]

  strain_name:
    description: Strain name
    type: ["string", "null"]

  samples:
    description: Sample information
    type: ["array", "null"]
    items:
      type: object
      properties:
        ident:
          type: string
        sample_id:
          type: string
        subject_id:
          type: string

  timepoints:
    description: Time point information
    type: ["array", "null"]
    items:
      type: object
      properties:
        timepoint_id:
          type: string
        label:
          type: string
        sample_id:
          type: string

  field_metadata:
    # Properties are populated dynamically from FIELD_LEVELS in constants.py.
    # Each level key maps to an object of field descriptors (type, label, display, range).
    # This stub is replaced by Python after loading the YAML.
    description: Metadata describing available data fields at each level
    type: ["object", "null"]
    properties: {}
    additionalProperties: false

  clones:
    description: Clonal families in the dataset
    type: ["array", "null"]
    items:
      $ref: "#/definitions/clone"

  trees:
    description: Phylogenetic trees in the dataset
    type: ["array", "null"]
    items:
      $ref: "#/definitions/tree"
