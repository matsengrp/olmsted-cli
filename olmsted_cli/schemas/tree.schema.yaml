# Olmsted Tree Schema
# JSON Schema (draft-07) for a phylogenetic tree.
#
# AIRR extensions: Fields marked [Olmsted extension] are added beyond AIRR 2.0.
# Fields marked [AIRR] follow the AIRR Schema 2.0 specification.
#
# The tree object wraps a Newick string with per-node data (nodes property).
# The nodes can be provided as an array or as a dict keyed by sequence_id.
#
# URL: https://olmstedviz.org/schemas/v1/tree.schema.json

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://olmstedviz.org/schemas/v1/tree.schema.json"
title: Tree
description: >
  Phylogenetic tree and possibly ancestral state reconstruction of sequences
  in a clonal family. Extends AIRR 2.0 with fields for tree topology
  (newick, nodes with parent/distance) and longitudinal summary statistics.

type: object
required:
  - newick
additionalProperties: true

definitions:
  timepoint_multiplicity:
    title: Timepoint multiplicity
    description: Multiplicity at a specific time
    type: object
    required:
      - multiplicity
      - timepoint_id
    properties:
      multiplicity:
        description: Number of times sequence was observed at the given timepoint
        type: integer
        minimum: 0
      timepoint_id:
        description: Id associated with the timepoint in question
        type: ["string", "null"]
    additionalProperties: false

  node:
    # Inline copy of node.schema.yaml; kept in sync via YAML authoring convention.
    # See node.schema.yaml for per-field AIRR/extension annotations.
    title: Node
    description: Node in a phylogenetic tree
    type: object
    required:
      - sequence_id
      - sequence_alignment
      - sequence_alignment_aa
    additionalProperties: true
    properties:
      sequence_id:
        description: Identifier for this node that matches the id in the newick string
        type: string
      node_id:
        description: Alternative identifier for this node
        type: string
      parent:
        description: Parent node ID
        type: ["string", "null"]
      branch_length:
        description: Branch length to parent
        type: ["number", "null"]
      length:
        description: Branch length (alias for branch_length)
        type: ["number", "null"]
      distance:
        description: Distance from root
        type: ["number", "null"]
      sequence_alignment:
        description: Nucleotide sequence alignment, including any indel corrections or spacers
        type: string
      sequence_alignment_aa:
        description: Amino acid sequence alignment, including any indel corrections or spacers
        type: ["string", "null"]
      sample_id:
        description: Sample identifier
        type: ["string", "null"]
      type:
        description: Type of node (leaf, internal, node, or root)
        type: ["string", "null"]
        enum: [leaf, node, internal, root, null]
      is_root:
        description: Whether this node is the root
        type: ["boolean", "null"]
      subtree_size:
        description: Number of descendants
        type: ["integer", "null"]
      timepoint:
        description: Timepoint identifier
        type: ["string", "null"]
      timepoint_id:
        description: Timepoint identifier (alternative field name)
        type: ["string", "null"]
      lbi:
        description: Local branching index
        type: ["number", "null"]
      lbr:
        description: Local branching ratio
        type: ["number", "null"]
      affinity:
        description: Binding affinity
        type: ["number", "null"]
      relative_affinity:
        description: Relative binding affinity
        type: ["number", "null"]
      affinity_class:
        description: Affinity classification
        type: ["string", "null"]
      aa_sequence:
        description: Full amino acid sequence
        type: ["string", "null"]
      junction:
        description: CDR3 junction nucleotide sequence
        type: ["string", "null"]
      junction_aa:
        description: CDR3 junction amino acid sequence
        type: ["string", "null"]
      v_call:
        description: V gene assignment
        type: ["string", "null"]
      d_call:
        description: D gene assignment
        type: ["string", "null"]
      j_call:
        description: J gene assignment
        type: ["string", "null"]
      count:
        description: Sequence count
        type: ["integer", "null"]
      confidence:
        description: Confidence score or bootstrap value
        type: ["number", "null"]
      multiplicity:
        description: Number of times sequence was observed
        type: ["integer", "null"]
      cluster_multiplicity:
        description: Cumulative count if sequences were clustered
        type: ["integer", "null"]
      timepoint_multiplicities:
        description: Multiplicities per timepoint
        type: ["array", "null"]
        items:
          $ref: "#/definitions/timepoint_multiplicity"
      cluster_timepoint_multiplicities:
        description: Cluster multiplicities per timepoint
        type: ["array", "null"]
        items:
          $ref: "#/definitions/timepoint_multiplicity"
      scaled_affinity:
        description: Scaled binding affinity (min-max normalized)
        type: ["number", "null"]

properties:
  ident:
    # [Olmsted extension] Internal UUID for the tree object.
    description: Tree identifier
    type: ["string", "null"]

  tree_id:
    # [Olmsted extension] Human-readable unique identifier for the tree.
    description: Unique identifier for the tree
    type: ["string", "null"]

  clone_id:
    # [AIRR] Identifier for the clonal family this tree belongs to.
    description: Identifier for the associated clone
    type: ["string", "null"]

  timepoint_ids:
    # [Olmsted extension] Timepoints represented in this tree.
    description: Time points included in this tree
    type: ["array", "null"]
    items:
      type: string

  downsampling_strategy:
    # [Olmsted extension] Method used to select sequences before tree inference.
    description: Method used to downsample sequences before tree inference
    type: ["string", "null"]

  diversity:
    # [Olmsted extension] Mean pairwise distance from all nodes to their MRCA.
    description: Mean distance from all tree nodes to their most recent common ancestor
    type: ["number", "null"]

  min_junction_length:
    # [Olmsted extension] Minimum CDR3 junction length across all nodes.
    description: Minimum CDR3 junction nucleotide length
    type: ["number", "null"]

  max_junction_length:
    # [Olmsted extension] Maximum CDR3 junction length across all nodes.
    description: Maximum CDR3 junction nucleotide length
    type: ["number", "null"]

  sample_id:
    # [AIRR] Sample identifier for associated sequences.
    description: Sample identifier for associated sequences
    type: ["string", "null"]

  newick:
    # [Olmsted extension] Tree topology as a Newick string.
    # Node labels in the Newick string must match sequence_id values in nodes.
    description: Tree in Newick format
    type: string

  nodes:
    # [Olmsted extension] Per-node data; may be an array or a dict keyed by sequence_id.
    description: Tree nodes as array of node objects or dict keyed by node ID
    oneOf:
      - type: array
        items:
          $ref: "#/definitions/node"
      - type: object
        additionalProperties:
          $ref: "#/definitions/node"
