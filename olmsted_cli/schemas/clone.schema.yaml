# Olmsted Clone Schema
# JSON Schema (draft-07) for a clonal family.
#
# AIRR extensions: Fields marked [Olmsted extension] are added beyond AIRR 2.0.
# Fields marked [AIRR] follow the AIRR Schema 2.0 specification.
# Fields marked [AIRR: changed] differ from AIRR 2.0 conventions.
#
# A "clone" (clonal family) is a group of B-cell sequences that derive from
# the same VDJ rearrangement event, identified by shared V/J genes and CDR3.
#
# URL: https://olmstedviz.org/schemas/v1/clone.schema.json

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://olmstedviz.org/schemas/v1/clone.schema.json"
title: Clone
description: >
  Clonal family of sequences deriving from a particular rearrangement event.
  Extends the AIRR 2.0 Clone object with Olmsted-specific fields for tree
  attachment, longitudinal data, and paired heavy/light chain analysis.

type: object
required:
  - unique_seqs_count
  - mean_mut_freq
additionalProperties: true

definitions:
  timepoint_multiplicity:
    title: Timepoint multiplicity
    description: Multiplicity at a specific time
    type: object
    required:
      - multiplicity
      - timepoint_id
    properties:
      multiplicity:
        description: Number of times sequence was observed at the given timepoint
        type: integer
        minimum: 0
      timepoint_id:
        description: Id associated with the timepoint in question
        type: ["string", "null"]
    additionalProperties: false

  node:
    title: Node
    description: Node in a phylogenetic tree
    type: object
    required:
      - sequence_id
      - sequence_alignment
      - sequence_alignment_aa
    additionalProperties: true
    properties:
      sequence_id:
        description: Identifier for this node that matches the id in the newick string
        type: string
      node_id:
        description: Alternative identifier for this node
        type: string
      parent:
        description: Parent node ID
        type: ["string", "null"]
      branch_length:
        description: Branch length to parent
        type: ["number", "null"]
      length:
        description: Branch length (alias for branch_length)
        type: ["number", "null"]
      distance:
        description: Distance from root
        type: ["number", "null"]
      sequence_alignment:
        description: Nucleotide sequence alignment, including any indel corrections or spacers
        type: string
      sequence_alignment_aa:
        description: Amino acid sequence alignment, including any indel corrections or spacers
        type: ["string", "null"]
      sample_id:
        description: Sample identifier
        type: ["string", "null"]
      type:
        description: Type of node (leaf, internal, node, or root)
        type: ["string", "null"]
        enum: [leaf, node, internal, root, null]
      is_root:
        description: Whether this node is the root
        type: ["boolean", "null"]
      subtree_size:
        description: Number of descendants
        type: ["integer", "null"]
      timepoint:
        description: Timepoint identifier
        type: ["string", "null"]
      timepoint_id:
        description: Timepoint identifier (alternative field name)
        type: ["string", "null"]
      lbi:
        description: Local branching index
        type: ["number", "null"]
      lbr:
        description: Local branching ratio
        type: ["number", "null"]
      affinity:
        description: Binding affinity
        type: ["number", "null"]
      relative_affinity:
        description: Relative binding affinity
        type: ["number", "null"]
      affinity_class:
        description: Affinity classification
        type: ["string", "null"]
      aa_sequence:
        description: Full amino acid sequence
        type: ["string", "null"]
      junction:
        description: CDR3 junction nucleotide sequence
        type: ["string", "null"]
      junction_aa:
        description: CDR3 junction amino acid sequence
        type: ["string", "null"]
      v_call:
        description: V gene assignment
        type: ["string", "null"]
      d_call:
        description: D gene assignment
        type: ["string", "null"]
      j_call:
        description: J gene assignment
        type: ["string", "null"]
      count:
        description: Sequence count
        type: ["integer", "null"]
      confidence:
        description: Confidence score or bootstrap value
        type: ["number", "null"]
      multiplicity:
        description: Number of times sequence was observed
        type: ["integer", "null"]
      cluster_multiplicity:
        description: Cumulative count if sequences were clustered
        type: ["integer", "null"]
      timepoint_multiplicities:
        description: Multiplicities per timepoint
        type: ["array", "null"]
        items:
          $ref: "#/definitions/timepoint_multiplicity"
      cluster_timepoint_multiplicities:
        description: Cluster multiplicities per timepoint
        type: ["array", "null"]
        items:
          $ref: "#/definitions/timepoint_multiplicity"
      scaled_affinity:
        description: Scaled binding affinity (min-max normalized)
        type: ["number", "null"]

  tree:
    title: Tree
    description: Phylogenetic tree and possibly ancestral state reconstruction
    type: object
    required:
      - newick
    additionalProperties: true
    properties:
      ident:
        description: Tree identifier
        type: ["string", "null"]
      tree_id:
        description: Unique identifier for the tree
        type: ["string", "null"]
      clone_id:
        description: Identifier for the associated clone
        type: ["string", "null"]
      timepoint_ids:
        description: Time points included in this tree
        type: ["array", "null"]
        items:
          type: string
      downsampling_strategy:
        description: Method used to downsample sequences before tree inference
        type: ["string", "null"]
      diversity:
        description: Mean distance from all tree nodes to their most recent common ancestor
        type: ["number", "null"]
      min_junction_length:
        description: Minimum CDR3 junction nucleotide length
        type: ["number", "null"]
      max_junction_length:
        description: Maximum CDR3 junction nucleotide length
        type: ["number", "null"]
      sample_id:
        description: Sample identifier for associated sequences
        type: ["string", "null"]
      newick:
        description: Tree in Newick format
        type: string
      nodes:
        description: Tree nodes as array of node objects or dict keyed by node ID
        oneOf:
          - type: array
            items:
              $ref: "#/definitions/node"
          - type: object
            additionalProperties:
              $ref: "#/definitions/node"

  per_gene_support_item:
    # [Olmsted extension] Per-gene assignment probability from IgBLAST or similar.
    type: object
    properties:
      gene:
        type: string
      ident:
        type: string
      prob:
        type: number
    required: [gene, ident, prob]
    additionalProperties: false

properties:
  ident:
    # [Olmsted extension] Internal UUID for the clone object.
    description: Clone identifier
    type: ["string", "null"]

  clone_id:
    # [AIRR] Unique identifier of the clonal family.
    description: Unique identifier of the clone
    type: ["string", "null"]

  dataset_id:
    # [Olmsted extension] Dataset this clone belongs to.
    description: Dataset identifier
    type: ["string", "null"]

  sample_id:
    # [AIRR] Sample identifier.
    description: Sample identifier
    type: ["string", "null"]

  subject_id:
    # [AIRR] Subject/participant identifier.
    description: Subject/participant identifier
    type: ["string", "null"]

  unique_seqs_count:
    # [Olmsted extension] Number of unique sequences in the clonal family.
    # Required for Olmsted visualization size encoding.
    description: Number of unique sequences in the clone
    type: integer

  total_read_count:
    # [Olmsted extension] Total reads (sum of multiplicities across all members).
    description: Total number of reads in the clone
    type: ["integer", "null"]

  clone_count:
    # [AIRR] Total number of sequences within the clone.
    description: Total number of sequences within the clone
    type: ["integer", "null"]

  mean_mut_freq:
    # [Olmsted extension] Mean somatic hypermutation frequency across all members.
    # Required for Olmsted visualization (scatterplot axis default).
    description: Mean mutation frequency
    type: number

  naive_sequence:
    # [Olmsted extension] Inferred unmutated common ancestor (UCA) sequence.
    description: Unmutated common ancestor sequence
    type: ["string", "null"]

  cdr3_sequence:
    # [AIRR] CDR3 nucleotide sequence representative for this clone.
    description: CDR3 nucleotide sequence
    type: ["string", "null"]

  v_call:
    # [AIRR] V gene assignment with allele (e.g., IGHV1-2*02).
    description: V gene assignment with allele
    type: ["string", "null"]

  d_call:
    # [AIRR] D gene assignment with allele.
    description: D gene assignment with allele
    type: ["string", "null"]

  j_call:
    # [AIRR] J gene assignment with allele.
    description: J gene assignment with allele
    type: ["string", "null"]

  v_sequence_start:
    # [AIRR] 1-based start position of V gene alignment in query sequence.
    # Note: AIRR uses 1-based, closed intervals for sequence coordinates.
    description: Start position of V gene alignment in query sequence
    type: ["integer", "null"]

  v_sequence_end:
    # [AIRR] 1-based end position of V gene alignment in query sequence.
    description: End position of V gene alignment in query sequence
    type: ["integer", "null"]

  v_germline_start:
    # [AIRR] Start position of V gene alignment in germline sequence.
    description: Start position of V gene alignment in germline sequence
    type: ["integer", "null"]

  v_germline_end:
    # [AIRR] End position of V gene alignment in germline sequence.
    description: End position of V gene alignment in germline sequence
    type: ["integer", "null"]

  v_alignment_start:
    # [Olmsted extension] 0-based start position in the V gene alignment.
    # Note: Olmsted uses 0-based positions internally (unlike AIRR's 1-based convention).
    description: Start position in the V gene alignment
    type: integer

  v_alignment_end:
    # [Olmsted extension] 0-based end position in the V gene alignment.
    description: End position in the V gene alignment
    type: integer

  d_sequence_start:
    description: Start position of D gene alignment in query sequence
    type: ["integer", "null"]

  d_sequence_end:
    description: End position of D gene alignment in query sequence
    type: ["integer", "null"]

  d_germline_start:
    description: Start position of D gene alignment in germline sequence
    type: ["integer", "null"]

  d_germline_end:
    description: End position of D gene alignment in germline sequence
    type: ["integer", "null"]

  d_alignment_start:
    description: Start position in the D gene alignment
    type: ["integer", "null"]

  d_alignment_end:
    description: End position in the D gene alignment
    type: ["integer", "null"]

  j_sequence_start:
    description: Start position of J gene alignment in query sequence
    type: ["integer", "null"]

  j_sequence_end:
    description: End position of J gene alignment in query sequence
    type: ["integer", "null"]

  j_germline_start:
    description: Start position of J gene alignment in germline sequence
    type: ["integer", "null"]

  j_germline_end:
    description: End position of J gene alignment in germline sequence
    type: ["integer", "null"]

  j_alignment_start:
    # [Olmsted extension] 0-based start position in the J gene alignment.
    description: Start position in the J gene alignment
    type: integer

  j_alignment_end:
    # [Olmsted extension] 0-based end position in the J gene alignment.
    description: End position in the J gene alignment
    type: integer

  junction_start:
    # [AIRR] Start position of the CDR3 junction.
    description: Start position of CDR3 junction
    type: ["integer", "null"]

  junction_end:
    # [AIRR] End position of the CDR3 junction.
    description: End position of CDR3 junction
    type: ["integer", "null"]

  junction_length:
    # [AIRR] Length of the CDR3 junction in nucleotides.
    description: Length of CDR3 junction
    type: ["integer", "null"]

  germline_alignment:
    # [AIRR] Assembled germline sequence aligned to the query.
    description: Assembled germline sequence aligned to query
    type: ["string", "null"]

  germline_sequence:
    # [Olmsted extension] Full germline sequence (not alignment-trimmed).
    description: Full germline sequence
    type: ["string", "null"]

  has_seed:
    # [Olmsted extension] Whether a seed sequence was used for clonal family assignment.
    description: Whether clone has seed sequence
    type: ["boolean", "null"]

  seed_id:
    # [Olmsted extension] Seed sequence identifier.
    description: Seed sequence identifier
    type: ["string", "null"]

  trees:
    # [Olmsted extension] Phylogenetic tree(s) built from this clonal family.
    description: Associated phylogenetic trees
    type: ["array", "null"]
    items:
      $ref: "#/definitions/tree"

  unique_ids:
    # [Olmsted extension] List of sequence_id values for all members of this clone.
    description: List of unique sequence identifiers
    type: ["array", "null"]
    items:
      type: string

  timepoint_ids:
    # [Olmsted extension] Timepoints represented in this clonal family.
    description: Time points included
    type: ["array", "null"]
    items:
      type: string

  v_per_gene_support:
    # [Olmsted extension] Per-gene V assignment probabilities from the gene caller.
    description: V gene assignment probabilities
    type: ["array", "null"]
    items:
      $ref: "#/definitions/per_gene_support_item"

  j_per_gene_support:
    # [Olmsted extension] Per-gene J assignment probabilities.
    description: J gene assignment probabilities
    type: ["array", "null"]
    items:
      $ref: "#/definitions/per_gene_support_item"

  d_per_gene_support:
    # [Olmsted extension] Per-gene D assignment probabilities.
    description: D gene assignment probabilities
    type: ["array", "null"]
    items:
      $ref: "#/definitions/per_gene_support_item"

  is_paired:
    # [Olmsted extension] True if this clone is part of a paired heavy/light chain dataset.
    description: Whether this clone is part of a paired heavy/light chain dataset
    type: ["boolean", "null"]

  pair_id:
    # [Olmsted extension] Identifier linking paired heavy and light chain clones.
    description: Identifier linking paired heavy and light chain clones
    type: ["string", "null"]
