# =============================================================================
# Olmsted CLI — Default PCP Configuration
# =============================================================================
#
# This config defines the standard processing options and field declarations
# for PCP (Parent-Child Pair) format data. Copy this file and customize it
# for your own datasets.
#
# Usage:
#   olmsted process -c config.yaml
#   olmsted process -c config.yaml -i my_data.csv    # CLI args override config
#
# Precedence: argparse defaults < config file < explicit CLI arguments
# =============================================================================


# --- Input / Output ----------------------------------------------------------

# Input PCP CSV file(s)
# inputs: [pcp.csv]

# Newick trees CSV file (optional, can be gzipped)
# tree: trees.csv

# Output file path (consolidated JSON)
# output: output/olmsted_data.json

# Alternative: split into separate files (datasets.json, clones.*.json, tree.*.json)
# split_files: output_dir/

format: pcp


# --- Processing Options ------------------------------------------------------

# Dataset name (stored in metadata, shown in web app)
# name: "My PCP Dataset"

# Random seed for deterministic UUID generation (omit for random UUIDs)
# seed: 42

# Compute phylogenetic metrics (LBI, LBR, mutation frequency) for all nodes
compute_metrics: false

# Time scale parameter for LBI calculation
lbi_tau: 0.0125

# Rename nodes to standardized names: naive, Node1, Node2, ..., Leaf1, Leaf2, ...
standardize_names: false

# Show warnings when tree and PCP data disagree on edges or branch lengths
warnings: false


# --- Output Options -----------------------------------------------------------

# JSON formatting: pretty (indented), compact (minified), gzip (compressed)
json_format: pretty

# Verbosity: 0=quiet, 1=normal, 2=verbose, 3=debug
verbose: 1

# Validate output against schemas before writing
validate: false

# Exit with error if validation fails (requires validate: true)
strict_validation: false


# --- Field Metadata -----------------------------------------------------------
#
# Fields are automatically discovered from your data and classified using
# built-in registries (see below). Use custom_fields to add fields the
# auto-detection doesn't know about, or to override type/label for fields
# it does know.
#
# Levels:
#   clone    — Clonal family level (scatterplot axes, color, facet)
#   node     — Tree node level (node properties, tooltips)
#   branch   — Tree branch level (branch coloring, width)
#   mutation  — Per-mutation level (alignment coloring)
#
# Types:
#   continuous  — Numeric values (axes, size, color scales)
#   categorical — String/enum values (color, shape, facet)
#   tooltip     — Display-only (shown in tooltips, not for encoding)
#
# Built-in clone fields (auto-detected when present):
#   unique_seqs_count  continuous   "Unique Sequences Count"
#   total_read_count   continuous   "Total Read Count"
#   mean_mut_freq      continuous   "Mean Mutation Frequency"
#   junction_length    continuous   "Junction Length"
#   clone_count        continuous   "Clone Count"
#   v_call             categorical  "V Gene"
#   d_call             categorical  "D Gene"
#   j_call             categorical  "J Gene"
#   locus              categorical  "Locus"           (from sample.locus)
#   subject_id         categorical  "Subject"
#   sample_id          categorical  "Sample"
#   has_seed           categorical  "Has Seed"
#   is_paired          categorical  "Is Paired"       (paired data only)
#   light_chain_type   categorical  "Light Chain Type" (paired data only)
#   v_call_light       categorical  "V Gene (Light)"  (paired data only)
#   j_call_light       categorical  "J Gene (Light)"  (paired data only)
#   rate_scale_heavy   continuous   "Rate Scale (Heavy)" (paired data only)
#   rate_scale_light   continuous   "Rate Scale (Light)" (paired data only)
#
# Built-in node fields (auto-detected when present):
#   lbi                  continuous   "LBI"                (requires --compute-metrics)
#   lbr                  continuous   "LBR"                (requires --compute-metrics)
#   multiplicity         continuous   "Multiplicity"
#   cluster_multiplicity continuous   "Cluster Multiplicity"
#   affinity             continuous   "Affinity"           (requires --compute-metrics)
#   scaled_affinity      continuous   "Scaled Affinity"    (requires --compute-metrics)
#   relative_affinity    continuous   "Relative Affinity"  (requires --compute-metrics)
#   distance             continuous   "Distance from Root"
#   subtree_size         continuous   "Subtree Size"
#   count                continuous   "Count"
#   confidence           continuous   "Confidence"
#   timepoint_id         categorical  "Timepoint"
#   affinity_class       categorical  "Affinity Class"
#
# Built-in branch fields (auto-detected when present):
#   length               continuous   "Branch Length"
#   branch_length        continuous   "Branch Length"
#
# To add custom fields or override built-in labels, uncomment and edit:

# custom_fields:
#   - name: my_clone_metric
#     level: clone
#     type: continuous
#     label: "My Clone Metric"
#
#   - name: my_node_category
#     level: node
#     type: categorical
#     label: "My Node Category"
